name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          cmdline-tools-version: 12.0
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true
          packages: |
            cmdline-tools;12.0
            platform-tools
            build-tools;34.0.0
            platforms;android-34

      - name: Cache Gradle dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.3.2-bin.zip -o gradle.zip
          unzip -q gradle.zip
          chmod +x gradle-8.3.2/bin/gradle

      - name: Build app
        run: |
          ./gradle-8.3.2/bin/gradle clean assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-reminder-apk
          path: app/build/outputs/apk/debug/app-debug.apk
